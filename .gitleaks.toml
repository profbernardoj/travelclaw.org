# Gitleaks allowlist for EverClaw CI
# These are all public values, example keys, or test fixtures

[allowlist]
description = "Allowlist for EverClaw CI - public contract addresses, example keys, test fixtures"

[[allowlist.regexes]]
# Public Ethereum contract addresses (MOR, USDC, Diamond, etc.)
regex = '''0x[a-fA-F0-9]{40}'''
description = "Ethereum addresses are public"

[[allowlist.regexes]]
# Anvil default test key (well-known, used in tests only)
regex = '''0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'''
description = "Anvil default test private key (public)"

[[allowlist.regexes]]
# Community bootstrap key (public, for demo/default installs)
regex = '''c2staWR0TVBJLmJlZTA0NjU3ZmNlOTBlYjk3MWQ0ZTJjMmMzYWFhZmJkZGI2NGY5YmZhMWY5NGVkMDJiMmIxOGNhNGEwMTQxZDA='''
description = "Community bootstrap API key (public)"

[[allowlist.regexes]]
# Example/placeholder API keys in docs
regex = '''YOUR_API_KEY|YOUR_MOR_GATEWAY_API_KEY|morpheus-local|sk_test_[a-zA-Z0-9]+'''
description = "Placeholder/example keys in documentation"

[[allowlist.regexes]]
# JWT tokens in test fixtures
regex = '''eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+'''
description = "JWT tokens in test fixtures"

[[allowlist.regexes]]
# Generic test keys
regex = '''(test-strong-key-[a-zA-Z0-9]+|ghp_[A-Z]{30,}|xoxb-[0-9]+-[a-zA-Z0-9]+)'''
description = "Test fixture keys"

[[allowlist.regexes]]
# Stripe example key
regex = '''sk_test_1234567890'''
description = "Stripe example key in docs"

[[allowlist.regexes]]
# curl auth examples
regex = '''Authorization:\s*Bearer\s+(morpheus-local|YOUR_API_KEY)'''
description = "curl auth examples in docs"

[[allowlist.paths]]
# Test files contain fixture keys
path = '''\.test\.mjs$'''

[[allowlist.paths]]
# Documentation
path = '''docs/'''

[[allowlist.paths]]
# Example files
path = '''examples/'''

[[allowlist.paths]]
# References (economics, troubleshooting)
path = '''references/'''

[[allowlist.paths]]
# PromptGuard test fixtures
path = '''skills/prompt-guard/tests/'''

[[allowlist.paths]]
# Bagman examples
path = '''skills/bagman/examples/'''